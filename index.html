<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Panel</title>

<style>
body {
    margin: 0;
    background: #0d1117;
    color: #00ff9c;
    font-family: monospace;
}

.container {
    padding: 10px;
}

.terminal {
    background: #010409;
    border-radius: 10px;
    padding: 10px;
    height: 90vh;
    overflow-y: auto;
    font-size: 13px;
}

.log {
    margin-bottom: 5px;
    word-wrap: break-word;
}

.get { color: #00bfff; }
.post { color: #ffcc00; }

@media (max-width: 600px) {
    .terminal {
        font-size: 11px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="terminal" id="terminal"></div>
</div>

<script>
const terminal = document.getElementById("terminal");

function renderLogs(data) {
    terminal.innerHTML = "";

    data.forEach(log => {
        const div = document.createElement("div");
        div.classList.add("log");

        let typeColor = log.type === "GET" ? "get" : "post";

        div.innerHTML = `
            <span>[${log.time}]</span> 
            <span class="${typeColor}">${log.type}</span> 
            <span>${log.ip}</span> 
            → ${JSON.stringify(log.data)}
        `;

        terminal.appendChild(div);
    });

    terminal.scrollTop = terminal.scrollHeight;
}

async function fetchLogs() {
    const res = await fetch("/logs");
    const data = await res.json();
    renderLogs(data);
}

setInterval(fetchLogs, 1000);
fetchLogs();
</script>

</body>
</html>
